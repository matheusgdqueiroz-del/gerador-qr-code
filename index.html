<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de QR Code</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <section class="left">
      <h1>Crie seu código QR<br>em apenas alguns cliques</h1>
      <p>Cole uma URL ou insira um texto para criar um código QR</p>

      <input id="qrText" type="text" placeholder="Enter text or url">
      <button id="generateBtn">Gerar Código QR</button>
    </section>

    <section class="right">
      <div class="qr-box" id="qrCode"></div>
      <button id="downloadBtn">Download</button>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
